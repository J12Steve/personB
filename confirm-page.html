<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận chuyển khoản | Liquid Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        /* Hiệu ứng kính mờ đồng bộ trang chủ */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Ô chọn ngân hàng */
        .bank-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bank-option:hover {
            background: var(--c-alpha);
            border-color: var(--c);
            transform: translateY(-5px) scale(1.02);
        }

        /* Nền Liquid chuyển động nhẹ */
        .liquid-bg {
            background: radial-gradient(circle at 50% 50%, #083344 0%, #020617 100%);
            position: fixed; inset: 0; z-index: -1;
        }

        /* Glow effect phía sau thẻ */
        .glow {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">
    <div class="liquid-bg"></div>

    <nav class="w-full max-w-md flex items-center justify-between mb-10">
        <a href="banking-page.html" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:border-cyan-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
        </a>
        <span class="text-[10px] font-black tracking-[0.4em] uppercase opacity-40 text-cyan-400">Xác nhận giao dịch</span>
        <div class="w-12"></div>
    </nav>

    <main class="w-full max-w-md space-y-8">
        <div class="glass-card p-8 rounded-[3rem] text-center relative overflow-hidden">
            <div class="glow"></div>
            <p class="text-[9px] font-black tracking-[0.3em] text-gray-500 uppercase mb-4">Bạn đang chuyển đến</p>
            
            <div class="space-y-1">
                <h2 id="display-bank" class="text-2xl font-black tracking-tight uppercase">...</h2>
                <p id="display-stk" class="text-cyan-400 font-mono text-xl font-bold tracking-tighter">...</p>
            </div>

            <div class="mt-6 py-2 px-5 bg-white/5 border border-white/5 rounded-full inline-block">
                <span id="display-name" class="text-[10px] font-bold uppercase tracking-widest text-gray-300">...</span>
            </div>
        </div>

        <div class="text-center space-y-1">
            <h3 class="text-sm font-bold text-white">Bạn sử dụng ngân hàng nào?</h3>
            <p class="text-[10px] text-gray-500 uppercase tracking-tighter">Nhấn vào để mở ứng dụng tương ứng</p>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div onclick="redirect('vcb')" class="bank-option p-4 rounded-[2rem] flex flex-col items-center gap-3" style="--c: #60a5fa; --c-alpha: rgba(96, 165, 250, 0.1);">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-bold text-[10px]">VCB</div>
                <span class="text-[8px] font-black opacity-60 uppercase text-center leading-tight">Vietcombank</span>
            </div>

            <div onclick="redirect('tcb')" class="bank-option p-4 rounded-[2rem] flex flex-col items-center gap-3" style="--c: #f87171; --c-alpha: rgba(248, 113, 113, 0.1);">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-bold text-[10px]">TCB</div>
                <span class="text-[8px] font-black opacity-60 uppercase text-center leading-tight text-red-400">Techcombank</span>
            </div>

            <div onclick="redirect('mb')" class="bank-option p-4 rounded-[2rem] flex flex-col items-center gap-3" style="--c: #3b82f6; --c-alpha: rgba(59, 130, 246, 0.1);">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-bold text-[10px]">MB</div>
                <span class="text-[8px] font-black opacity-60 uppercase text-center leading-tight text-blue-400">MB Bank</span>
            </div>

            <div onclick="redirect('tpb')" class="bank-option p-4 rounded-[2rem] flex flex-col items-center gap-3" style="--c: #a855f7; --c-alpha: rgba(168, 85, 247, 0.1);">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-bold text-[10px]">TPB</div>
                <span class="text-[8px] font-black opacity-60 uppercase text-center leading-tight text-purple-400">TPBank</span>
            </div>

            <div onclick="redirect('acb')" class="bank-option p-4 rounded-[2rem] flex flex-col items-center gap-3" style="--c: #0ea5e9; --c-alpha: rgba(14, 165, 233, 0.1);">
                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-bold text-[10px]">ACB</div>
                <span class="text-[8px] font-black opacity-60 uppercase text-center leading-tight text-sky-400">ACB Bank</span>
            </div>

            <div onclick="redirect('momo')" class="bank-option p-4 rounded-[2rem] flex flex-col items-center gap-3" style="--c: #f472b6; --c-alpha: rgba(244, 114, 182, 0.1);">
                <div class="w-10 h-10 rounded-xl bg-pink-500/20 flex items-center justify-center font-bold text-[10px] text-pink-500">M</div>
                <span class="text-[8px] font-black opacity-60 uppercase text-center leading-tight text-pink-400">MoMo</span>
            </div>
        </div>
    </main>

    <script>
        // Lấy thông tin từ URL (STK của bạn)
        const params = new URLSearchParams(window.location.search);
        const myBank = params.get('bank'); 
        const myStk = params.get('stk');   
        const myName = params.get('name');

        // Hiển thị lên giao diện
        document.getElementById('display-bank').innerText = myBank ? myBank.toUpperCase() : 'NGÂN HÀNG';
        document.getElementById('display-stk').innerText = myStk || '0000 0000 000';
        document.getElementById('display-name').innerText = myName || 'LAM TRAN HOANG PHUC';

        /**
         * HÀM SỬA LỖI: Truyền tham số 'app' để dl.vietqr.io nhận diện ứng dụng cần mở
         * userApp: Mã định danh app của người dùng (vcb, tcb, mb...)
         */
        function redirect(userApp) {
            if (!myBank || !myStk) return;
            
            // Link Deep Link đầy đủ tham số để tránh lỗi "Missing parameter app"
            const vietQRLink = `https://dl.vietqr.io/pay?app=${userApp}&bank=${myBank}&account=${myStk}`;
            
            // Thực hiện mở App
            window.location.href = vietQRLink;
        }
    </script>
</body>
</html>
