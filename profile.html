<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        /* --- Nền Ambient --- */
        .orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.1; animation: float 25s infinite alternate ease-in-out; }
        .orb-1 { background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { background: #818cf8; bottom: -10%; right: -10%; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.2); } }
        /* --- Desktop: Horizontal Menu --- */
        @media (min-width: 1024px) {
            #desktop-nav { display: flex; }
            #sidebar, #menu-toggle { display: none; }
            #main-wrapper { padding-top: 120px; }
        }

        /* --- Mobile: Sidebar & Animation --- */
        @media (max-width: 1023px) {
            #desktop-nav { display: none; }
            #sidebar { position: fixed; inset: 0; width: 280px; transform: translateX(-100%); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 200; }
            body.menu-open #sidebar { transform: translateX(0); }
            
            /* Hiệu ứng bẻ lái màn hình chính */
            body.menu-open #main-wrapper { 
                transform: scale(0.85) translateX(280px) rotateY(-10deg); 
                filter: blur(5px);
                opacity: 0.3;
                pointer-events: none;
            }
        }

        #main-wrapper { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); transform-origin: left center; perspective: 1500px;padding-top: 80px; }

        .glass-node { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }

        /* --- Timeline Logic --- */
        .timeline-container::before {
            content: ''; position: absolute; width: 2px; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.2), rgba(129, 140, 248, 0.2), transparent);
            left: 20px;
        }

        .dot-glow {
            position: absolute; width: 14px; height: 14px; border-radius: 50%; z-index: 10;
            animation: pulse-fade 3s infinite ease-in-out; left: 14px; top: 24px;
        }

        @media (min-width: 768px) {
            .timeline-container::before { left: 50%; transform: translateX(-50%); }
            .dot-glow { left: 50% !important; transform: translateX(-50%) scale(1); }
            @keyframes pulse-fade {
                0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.8); box-shadow: 0 0 0px var(--accent); }
                50% { opacity: 1; transform: translateX(-50%) scale(1.2); box-shadow: 0 0 15px var(--accent); }
            }
        }

        .dot-a { animation-delay: 0s; }
        .dot-b { animation-delay: 1.5s; }

        /* --- Popup / Modal Style --- */
        #popup-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; display: none;
            align-items: center; justify-content: center; padding: 20px;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #popup-content {
            transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 600px; width: 100%;
        }
        body.popup-open { overflow: hidden; }
        body.popup-open #popup-overlay { display: flex; opacity: 1; }
        body.popup-open #popup-content { transform: scale(1); }

        /* Cursor & Nav */
        @media (min-width: 1024px) {
            #desktop-nav { display: flex; top: 24px; }
            #main-wrapper { padding-top: 140px; }
            html, body, a, button { cursor: none !important; }
            #custom-cursor { position: fixed; top: 0; left: 0; width: 24px; height: 24px; background: url('image/mouse/arrowhead.png') no-repeat center/contain; pointer-events: none; z-index: 9999; }
            .cursor-active #custom-cursor { background-image: url('image/mouse/hand-pointer.png'); width: 28px; height: 28px; }
        }
    </style>
</head>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    // --- KHAI BÁO BIẾN (Đây là phần bị thiếu) ---
    const body = document.body;
    const menuBtn = document.getElementById('menu-toggle');
    const mainWrapper = document.getElementById('main-wrapper');
    const hamIcon = document.getElementById('ham-icon');

    // Toggle Sidebar Mobile
    menuBtn?.addEventListener('click', (e) => {
        e.stopPropagation(); // Ngăn sự kiện nổi bọt
        body.classList.toggle('menu-open');
        
        const isOpen = body.classList.contains('menu-open');
        // Thay đổi icon menu thành dấu X
        hamIcon.innerHTML = isOpen 
            ? '<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round"/>' 
            : '<path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round"/>';
    });

    // Đóng Sidebar khi chạm vào vùng màn hình chính
    mainWrapper?.addEventListener('click', () => {
        if(body.classList.contains('menu-open')) {
            body.classList.remove('menu-open');
            hamIcon.innerHTML = '<path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round"/>';
        }
    });

    // Popup Logic
    function openPopup(title, date, desc) {
        document.getElementById('pop-title').innerText = title;
        document.getElementById('pop-date').innerText = date;
        // Sử dụng innerText để giữ định dạng xuống dòng từ \n
        document.getElementById('pop-desc').innerText = desc;
        body.classList.add('popup-open');
    }

    function closePopup() {
        body.classList.remove('popup-open');
    }

    // Cursor Logic
    const cursor = document.getElementById('custom-cursor');
    window.addEventListener('mousemove', (e) => {
        if(cursor) cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
    });

    document.querySelectorAll('a, button, .glass-node').forEach(el => {
        el.addEventListener('mouseenter', () => body.classList.add('cursor-active'));
        el.addEventListener('mouseleave', () => body.classList.remove('cursor-active'));
    });
</script>
