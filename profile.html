    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --accent: #22d3ee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        /* --- Nền Ambient --- */
        .orb { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.1; animation: float 25s infinite alternate ease-in-out; }
        .orb-1 { background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { background: #818cf8; bottom: -10%; right: -10%; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.2); } }

        .glass-node { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }

        /* --- Timeline Logic --- */
        .timeline-container::before {
            content: ''; position: absolute; width: 2px; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.2), rgba(129, 140, 248, 0.2), transparent);
            left: 20px;
        }

        .dot-glow {
            position: absolute; width: 14px; height: 14px; border-radius: 50%; z-index: 10;
            animation: pulse-fade 3s infinite ease-in-out; left: 14px; top: 24px;
        }

        @media (min-width: 768px) {
            .timeline-container::before { left: 50%; transform: translateX(-50%); }
            .dot-glow { left: 50% !important; transform: translateX(-50%) scale(1); }
            @keyframes pulse-fade {
                0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.8); box-shadow: 0 0 0px var(--accent); }
                50% { opacity: 1; transform: translateX(-50%) scale(1.2); box-shadow: 0 0 15px var(--accent); }
            }
        }

        .dot-a { animation-delay: 0s; }
        .dot-b { animation-delay: 1.5s; }

        /* --- Popup / Modal Style --- */
        #popup-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; display: none;
            align-items: center; justify-content: center; padding: 20px;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #popup-content {
            transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 600px; width: 100%;
        }
        body.popup-open { overflow: hidden; }
        body.popup-open #popup-overlay { display: flex; opacity: 1; }
        body.popup-open #popup-content { transform: scale(1); }

        /* Cursor & Nav */
        @media (min-width: 1024px) {
            #desktop-nav { display: flex; top: 24px; }
            #main-wrapper { padding-top: 140px; }
            html, body, a, button { cursor: none !important; }
            #custom-cursor { position: fixed; top: 0; left: 0; width: 24px; height: 24px; background: url('image/mouse/arrowhead.png') no-repeat center/contain; pointer-events: none; z-index: 9999; }
            .cursor-active #custom-cursor { background-image: url('image/mouse/hand-pointer.png'); width: 28px; height: 28px; }
        }
    </style>
</head>

    <div id="popup-overlay" onclick="closePopup()">
        <div id="popup-content" class="glass-node p-10 rounded-[3rem] border-white/20 relative" onclick="event.stopPropagation()">
            <button class="absolute top-6 right-8 opacity-40 hover:opacity-100 text-2xl transition-all" onclick="closePopup()">&times;</button>
            <span id="pop-date" class="text-cyan-400 font-mono text-[10px] font-bold tracking-[0.3em] uppercase"></span>
            <h2 id="pop-title" class="text-4xl font-black italic mt-2 mb-6 uppercase tracking-tighter"></h2>
            <div class="h-px bg-white/10 mb-6"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Popup Logic
        function openPopup(title, date, desc) {
            document.getElementById('pop-title').innerText = title;
            document.getElementById('pop-date').innerText = date;
            document.getElementById('pop-desc').innerText = desc;
            document.body.classList.add('popup-open');
        }

        function closePopup() {
            document.body.classList.remove('popup-open');
        }

        // Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            if(cursor) cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });

        document.querySelectorAll('a, button, .glass-node').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-active'));
        });
    </script>
