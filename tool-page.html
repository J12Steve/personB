<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updating...</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", cursive;
    overflow: hidden;
    animation: bgFlash 1s infinite;
}

@keyframes bgFlash {
    0%   { background: red; }
    20%  { background: yellow; }
    40%  { background: lime; }
    60%  { background: cyan; }
    80%  { background: magenta; }
    100% { background: red; }
}

/* ===== Thanh chạy ===== */
.marquee {
    width: 100%;
    overflow: hidden;
    background: linear-gradient(90deg, red, yellow, lime, cyan, magenta, red);
    color: white;
    white-space: nowrap;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 3;
    border-bottom: 4px dashed yellow;
    box-shadow: 0 0 20px lime;
}

.marquee-track {
    display: flex;
    width: max-content;
    animation: scroll 20s linear infinite;
}

.marquee-content {
    padding: 10px 60px;
    font-weight: bold;
    font-size: 18px;
    text-shadow: 0 0 5px #fff, 0 0 10px #0ff, 0 0 20px #f0f;
    animation: blink 1s infinite alternate;
}

@keyframes scroll {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

@keyframes blink {
    from { opacity: 1; }
    to { opacity: 0.6; }
}

/* ===== Ảnh ===== */
.show {
    position: relative;
    width: 100%;
    height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 70px;
}

.frame {
    padding: 10px;
    border: 6px ridge cyan;
    background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px);
    box-shadow: 0 0 20px cyan, 0 0 40px magenta;
}

.frame img {
    max-width: 100%;
    max-height: 60vh;
    object-fit: contain;
    display: block;
}

/* ===== Text ===== */
.title {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: yellow;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px red, -2px -2px cyan, 0 0 10px white;
    animation: blink 0.8s infinite alternate;
}

.title2 {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: cyan;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px magenta, -2px -2px yellow, 0 0 10px white;
    animation: blink 1s infinite alternate;
}

/* ===== Sparkle ===== */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 6px white, 0 0 12px cyan, 0 0 18px magenta;
    animation: sparkle 1.5s infinite ease-in-out;
}

.sparkle:nth-child(1) { top: 10%; left: 20%; }
.sparkle:nth-child(2) { top: 30%; left: 70%; }
.sparkle:nth-child(3) { top: 60%; left: 40%; }
.sparkle:nth-child(4) { top: 80%; left: 80%; }
.sparkle:nth-child(5) { top: 50%; left: 10%; }
.sparkle:nth-child(6) { top: 20%; left: 50%; }
.sparkle:nth-child(7) { top: 75%; left: 30%; }

@keyframes sparkle {
    0% { transform: scale(0.5); opacity: 0.2; }
    50% { transform: scale(2); opacity: 1; }
    100% { transform: scale(0.5); opacity: 0.2; }
}

/* ===== Footer ===== */
footer {
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
}

footer img {
    width: 100%;
    height: 200px;
    display: block;
}
</style>
</head>

<body>

<!-- Thanh chạy -->
<div class="marquee">
    <div class="marquee-track">
        <div class="marquee-content">💿 ĐANG CẬP NHẬT WEBSITE... 💿</div>
        <div class="marquee-content">💿 ĐANG CẬP NHẬT WEBSITE... 💿</div>
    </div>
</div>

<!-- Nội dung -->
<div class="show">
    <div class="frame">
        <img src="image/wait.jpg">
    </div>

    <!-- Sparkle -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="title">✨ PLEASE WAIT... LOADING MAGIC... ✨</div>
    <div class="title2">✨ VUI LÒNG CHỜ... ĐANG TẢI... ✨</div>
</div>

<!-- Nhạc -->
<audio id="bgMusic" src="sound.mp3" loop></audio>

<script>
const audio = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    audio.currentTime = 24;

    const playPromise = audio.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            document.addEventListener("click", () => {
                audio.currentTime = 24;
                audio.play();
            }, { once: true });
        });
    }
});
</script>

<!-- Footer -->
<footer>
    <img src="shipping-policy-anh-hoa-sen-de-11562884313wqvznkao.png">
</footer>

</body>
</html>
